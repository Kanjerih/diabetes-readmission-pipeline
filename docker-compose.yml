version: '3.8'

services:
  # Service 1: The FastAPI Backend
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  # Service 2: The Streamlit Frontend Interface
  frontend:
    build: .
    # Use explicit port/address flags
    command: python -m streamlit run src/frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
    environment:
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=true
      # These specific variables force Streamlit to listen externally
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHERUSAGESTATS=false