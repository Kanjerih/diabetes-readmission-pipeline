version: '3.8'
services:
  # Service 1: The FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "10000:10000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=10000
 
  # Service 2: The Streamlit Frontend Interface
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
    environment:
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=true
      - PORT=8501
      # These specific variables force Streamlit to listen externally
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHERUSAGESTATS=false